<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/kamara-icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/kamara-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/kamara-512.png" />
    <link rel="apple-touch-icon" href="/icons/kamara-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kamara - AI compliance document checker for food tech founders exporting to EU/UK markets" />
    <meta name="theme-color" content="#16A34A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Kamara" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <title>Kamara — AI Compliance Checker for Food Tech</title>
  </head>
  <body class="bg-[#F9FAFB] text-[#111827] font-normal antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('Kamara PWA: Service worker registered', reg.scope);
          }).catch(err => {
            console.log('Kamara PWA: Service worker registration failed', err);
          });
        });
      }
    </script>
  </body>
</html>
