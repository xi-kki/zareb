services:
  - type: web
    name: zareb-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: "false"
      - key: AI_PROVIDER
        value: "groq"
      - key: GROQ_MODEL
        value: "llama-3.1-70b-versatile"
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://zareb.netlify.app"
healthCheckPath: /health
