name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build

  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m flake8 app/ main.py --max-line-length=100
        continue-on-error: true
      - run: python -c "from main import app; print('✅ App imports OK')"

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for potential secrets
        run: |
          if grep -rE '(API[_-]?KEY|SECRET|PASSWORD|TOKEN|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36})' \
            --include='*.{js,ts,py,go,rb,rs,sh,env,yml,yaml,json,md,config}' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=__pycache__ \
            --exclude-dir=venv --exclude-dir=venv_new --exclude-dir=venv_nuri .; then
            echo "❌ Potential secrets detected in code!"
            exit 1
          fi
          echo "✅ No secrets found"

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: frontend
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
        working-directory: frontend
